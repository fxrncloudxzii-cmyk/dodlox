<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me! Core Grid Environment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #b3e5fc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .game-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(13, 6, 0, 0.85);
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            backdrop-filter: blur(8px);
            border: 2px solid #ff941a;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        .game-title {
            font-size: 18px;
            font-weight: bold;
            color: #ff941a;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="game-hud">
        <div class="game-title">🏡 Adopt Me! Core Stream</div>
        <div id="hud-user-label" style="font-size:12px; color:#ccc; margin-top:4px;">Loading Profile Engine...</div>
    </div>

    <div id="game-canvas"></div>

    <script>
        let scene, camera, renderer, houseGroup, playerGroup;
        let headMesh, torsoMesh, leftArm, rightArm, leftLeg, rightLeg;

        // 🟢 THE CORE MATRIX FIX: Default fallbacks that instantly overwrite from your actual active profile database
        let avatarColors = {
            skin: "#f1c27d",
            shirt: "#ff941a",
            pants: "#1e3799"
        };
        let currentSessionUsername = "Player";

        function pullActiveCoreSystemProfile() {
            try {
                const activeSession = sessionStorage.getItem('mb_active_session');
                const usersDB = JSON.parse(localStorage.getItem('mb_users_db')) || {};
                
                if (activeSession && usersDB[activeSession.toLowerCase()]) {
                    const profile = usersDB[activeSession.toLowerCase()];
                    currentSessionUsername = profile.user || "Player";
                    
                    // Pull the custom colors saved by your avatar customizer screen
                    if (profile.avatar) {
                        avatarColors.skin = profile.avatar.skin || avatarColors.skin;
                        avatarColors.shirt = profile.avatar.shirt || avatarColors.shirt;
                        avatarColors.pants = profile.avatar.pants || avatarColors.pants;
                    }
                    document.getElementById('hud-user-label').innerText = `Active User: ${currentSessionUsername}`;
                } else {
                    document.getElementById('hud-user-label').innerText = `Active User: Guest Mode`;
                }
            } catch (err) {
                console.log("Core system storage hook state offline, using defaults.");
            }
        }

        function initGameWorld() {
            // First read what your system customized
            pullActiveCoreSystemProfile();

            const container = document.getElementById('game-canvas');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xb3e5fc);
            scene.fog = new THREE.FogExp2(0xb3e5fc, 0.015);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 16);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const mainSun = new THREE.DirectionalLight(0xfffdf2, 0.9);
            mainSun.position.set(15, 30, 15);
            mainSun.castShadow = true;
            mainSun.shadow.mapSize.width = 2048;
            mainSun.shadow.mapSize.height = 2048;
            scene.add(mainSun);

            // Ground/Grass Base
            const groundGeo = new THREE.PlaneGeometry(120, 120);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.9 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 🏡 PREMIUM MODULAR SPECIFICITY HOUSE BUILD
            houseGroup = new THREE.Group();

            // Main Core Foundation Structure
            const wallGeo = new THREE.BoxGeometry(8, 5.5, 6.5);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xfff9c4, roughness: 0.6 }); 
            const mainWalls = new THREE.Mesh(wallGeo, wallMat);
            mainWalls.position.y = 2.75;
            mainWalls.castShadow = true;
            mainWalls.receiveShadow = true;
            houseGroup.add(mainWalls);

            // Clean Overhead Wedge Roof Profile
            const roofShape = new THREE.Shape();
            roofShape.moveTo(-4.5, 0);
            roofShape.lineTo(0, 3);
            roofShape.lineTo(4.5, 0);
            roofShape.lineTo(-4.5, 0);

            const extrudeOpts = { depth: 7, bevelEnabled: true, bevelSize: 0.05, bevelThickness: 0.05, steps: 1 };
            const roofGeo = new THREE.ExtrudeGeometry(roofShape, extrudeOpts);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0xe57373, roughness: 0.4 });
            const roofMesh = new THREE.Mesh(roofGeo, roofMat);
            roofMesh.position.set(0, 5.5, -3.5); 
            roofMesh.castShadow = true;
            houseGroup.add(roofMesh);

            // Intricate Panelled Modern Door Structure
            const doorFrameGeo = new THREE.BoxGeometry(1.6, 2.6, 0.15);
            const doorFrameMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const doorFrame = new THREE.Mesh(doorFrameGeo, doorFrameMat);
            doorFrame.position.set(0, 1.3, 3.26);
            houseGroup.add(doorFrame);

            const doorGeo = new THREE.BoxGeometry(1.3, 2.4, 0.1);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x42a5f5, roughness: 0.4 });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 1.2, 3.3);
            houseGroup.add(door);

            // Windows Layout (Left side and Right side frames)
            const winOuterGeo = new THREE.BoxGeometry(1.4, 1.4, 0.15);
            const winOuterMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const glassPaneGeo = new THREE.BoxGeometry(1.2, 1.2, 0.1);
            const glassPaneMat = new THREE.MeshStandardMaterial({ color: 0xe0f7fa, transparent: true, opacity: 0.5, roughness: 0.1 });

            // Left Window Build
            const leftWinOuter = new THREE.Mesh(winOuterGeo, winOuterMat);
            leftWinOuter.position.set(-2.4, 3, 3.26);
            houseGroup.add(leftWinOuter);
            const leftGlass = new THREE.Mesh(glassPaneGeo, glassPaneMat);
            leftGlass.position.set(-2.4, 3, 3.3);
            houseGroup.add(leftGlass);

            // Right Window Build
            const rightWinOuter = leftWinOuter.clone();
            rightWinOuter.position.x = 2.4;
            houseGroup.add(rightWinOuter);
            const rightGlass = leftGlass.clone();
            rightGlass.position.x = 2.4;
            houseGroup.add(rightGlass);

            // Stone Path Approach
            const pathwayGeo = new THREE.PlaneGeometry(2, 6);
            const pathwayMat = new THREE.MeshStandardMaterial({ color: 0xb0bec5, roughness: 0.9 });
            const path = new THREE.Mesh(pathwayGeo, pathwayMat);
            path.rotation.x = -Math.PI / 2;
            path.position.set(0, 0.02, 6.2);
            path.receiveShadow = true;
            scene.add(path);

            scene.add(houseGroup);

            // 👤 GENERATE CORE PLAYER FROM TRACKED ATTRIBUTES
            buildCoreSystemAvatar();

            camera.lookAt(0, 2.8, 0);
            animateGameLoop();
        }

        function buildCoreSystemAvatar() {
            playerGroup = new THREE.Group();

            // Head (Skin Hex)
            const headGeo = new THREE.BoxGeometry(1, 1, 1);
            const headMat = new THREE.MeshStandardMaterial({ color: avatarColors.skin, roughness: 0.7 });
            headMesh = new THREE.Mesh(headGeo, headMat);
            headMesh.position.y = 2.9;
            headMesh.castShadow = true;
            playerGroup.add(headMesh);

            // Torso (Shirt Hex)
            const torsoGeo = new THREE.BoxGeometry(1.5, 1.7, 0.85);
            const shirtMat = new THREE.MeshStandardMaterial({ color: avatarColors.shirt, roughness: 0.7 });
            torsoMesh = new THREE.Mesh(torsoGeo, shirtMat);
            torsoMesh.position.y = 1.55;
            torsoMesh.castShadow = true;
            playerGroup.add(torsoMesh);

            // Arms (Skin Hex)
            const armGeo = new THREE.BoxGeometry(0.6, 1.7, 0.7);
            leftArm = new THREE.Mesh(armGeo, headMat);
            leftArm.position.set(-1.1, 1.55, 0);
            leftArm.castShadow = true;
            playerGroup.add(leftArm);

            rightArm = new THREE.Mesh(armGeo, headMat);
            rightArm.position.set(1.1, 1.55, 0);
            rightArm.castShadow = true;
            playerGroup.add(rightArm);

            // Legs (Pants Hex)
            const legGeo = new THREE.BoxGeometry(0.7, 1.5, 0.8);
            const pantsMat = new THREE.MeshStandardMaterial({ color: avatarColors.pants, roughness: 0.7 });
            leftLeg = new THREE.Mesh(legGeo, pantsMat);
            leftLeg.position.set(-0.38, 0.75, 0);
            leftLeg.castShadow = true;
            playerGroup.add(leftLeg);

            rightLeg = new THREE.Mesh(legGeo, pantsMat);
            rightLeg.position.set(0.38, 0.75, 0);
            rightLeg.castShadow = true;
            playerGroup.add(rightLeg);

            // Face character straight toward house entry point on the lane edge
            playerGroup.position.set(0, 0.01, 8);
            scene.add(playerGroup);
        }

        function animateGameLoop() {
            requestAnimationFrame(animateGameLoop);

            const timer = Date.now() * 0.001;

            if (houseGroup) {
                houseGroup.rotation.y = Math.sin(timer * 0.1) * 0.04;
            }

            if (playerGroup && leftArm && rightArm) {
                // Subtle core idle leg/arm sway motions
                leftArm.rotation.x = Math.sin(timer * 2.5) * 0.06;
                rightArm.rotation.x = -Math.sin(timer * 2.5) * 0.06;
                playerGroup.position.y = Math.abs(Math.sin(timer * 1.8)) * 0.03;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

            window.addEventListener('DOMContentLoaded', initGameWorld);
    </script>
</body>
</html>
